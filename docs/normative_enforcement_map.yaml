version: 1
clauses:
  NCI-LSP-FIRST:
    status: enforced
    enforcing_modules:
      - src/gabion/cli.py
      - src/gabion/lsp_client.py
      - src/gabion/commands/transport_policy.py
    ci_anchors:
      - workflow: .github/workflows/ci.yml
        job: checks
        step: LSP parity gate
    expected_artifacts:
      - artifacts/out/lsp_parity_gate.json
  NCI-ACTIONS-PINNED:
    status: enforced
    enforcing_modules:
      - scripts/policy/policy_check.py
      - docs/allowed_actions.txt
    ci_anchors:
      - workflow: .github/workflows/ci.yml
        job: checks
        step: Policy check (workflows)
    expected_artifacts: []
  NCI-ACTIONS-ALLOWLIST:
    status: enforced
    enforcing_modules:
      - scripts/policy/policy_check.py
      - docs/allowed_actions.txt
    ci_anchors:
