rules:
  - rule_id: projection_fiber.convergence.blocking
    domain: projection_fiber
    severity: blocking
    predicate:
      op: rows_any
      path: [witness_rows]
      predicate:
        op: all
        predicates:
          - op: str_eq
            path: [obligation_state]
            value: unresolved
          - op: bool_true
            path: [boundary_crossed]
    outcome:
      kind: block
      message: projection fiber convergence policy violations
    evidence_contract: none

  - rule_id: projection_fiber.convergence.ok
    domain: projection_fiber
    severity: info
    predicate:
      op: always
    outcome:
      kind: pass
      message: projection fiber convergence clean
    evidence_contract: none

transforms:
  - transform_id: projection.unmapped_intro
    intro_from: unmapped_witness
    erase_when: mapping_complete
