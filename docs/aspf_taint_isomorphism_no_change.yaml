justification: marker protocol generalization now classifies todo/deprecated marker kinds in runtime never/todo/deprecated markers and static alias-map extraction while preserving crosswalk row coverage; current taint diagnostic and marker-ingress refinements preserve existing ASPF crosswalk obligations and identifier anchors; decision-protocol module markers introduced for policy compliance do not alter marker/ASPF identifier mappings; boundary-normalization markers on taint/ci-watch payload extraction helpers are policy-annotation only and do not alter ASPF identifier mappings or taint crosswalk semantics; marker reason coercion to string at payload normalization is runtime-hardening for invariant throws and does not change ASPF identifier anchors or taint crosswalk semantics; PatternSchema semantic-surface expansion and projection extraction (`pattern_schema_instances` / `pattern_schema_residue`) extends ASPF payload coverage without changing taint-isomorphism step obligations or identifier anchor semantics; branchless-policy remediation markers added across extracted analysis owners are annotation-only and do not change ASPF taint crosswalk identities, in-step obligations, or identifier anchor semantics; canonical test-evidence path/qualname compatibility normalization preserves legacy identifiers at the evidence boundary and does not alter ASPF taint crosswalk identities or step obligations; indexed-scan role-separation extraction into `src/gabion/analysis/indexed_scan/` is ownership relocation only and does not alter taint/ASPF identity mapping, anchor keys, or crosswalk obligations; extracting handledness/exception-obligation/never-invariant role owners preserves existing witness identifiers and taint crosswalk semantics while relocating implementation ownership; recursive indexed-scan substrate extraction (`ast_context`, `marker_metadata`, `reachability`, handledness/obligation decision protocols) preserves witness id shapes, marker ids, and exception-path anchors while moving control-shaping logic to typed owner seams; resume-state payload serialization/loading extraction into `indexed_scan.resume_state` retains invariant IDs, completion path keys, and analysis-index carrier semantics while relocating implementation ownership away from the indexed boundary file; deadline-runtime extraction into `indexed_scan.deadline_runtime` (suite-site identity helpers, call-resolution obligation materialization, and deadline argument classification) preserves existing `CallCandidate`/`CallResolutionObligation` evidence keys, suite-id anchors, and marker/taint crosswalk identifiers while reducing branch-heavy monolith ownership.
