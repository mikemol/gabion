nchors while moving control-shaping logic to typed owner seams; resume-state payload serialization/loading extraction into `indexed_scan.resume_state` retains invariant IDs, completion path keys, and analysis-index carrier semantics while relocating implementation ownership away from the indexed boundary file; deadline-runtime extraction into `indexed_scan.deadline_runtime` (suite-site identity helpers, call-resolution obligation materialization, and deadline argument classification) preserves existing `CallCandidate`/`CallResolutionObligation` evidence keys, suite-id anchors, and marker/taint crosswalk identifiers while reducing branch-heavy monolith ownership; dispatch-table refactor in `test_evidence_suggestions._evidence_for_alt` preserves decision/never evidence key families and identifier shape while replacing prefix branching with deterministic prefix-to-builder mapping; expression-evaluator and parsed-context walker extraction (`indexed_scan.expression_eval`, `indexed_scan.context_walkers`) relocates deterministic control evaluation from indexed boundary internals without altering exception-path IDs, never-marker IDs, handledness IDs, or ASPF/taint crosswalk anchors; indexed boundary hard-cut wrappers for lint/type-parse/constant-deadness helper ownership preserve lint codes, deadness identifiers, and taint/ASPF crosswalk anchor identities while removing duplicate branch surfaces in the monolith; delegation of projection-spec row materialization and span-format rendering from indexed boundary to reporting owner preserves spec hashes, facet evidence payload keys, and report-section anchor identities while reducing duplicate branch surfaces in taint/ASPF-marked analysis runtime code; ambiguity-helper wrapper simplification to direct alias exports preserves ambiguity witness keys, suite-order projection anchors, and bundle-forest evidence identities while removing redundant pass-through branch surfaces in taint/ASPF-marked helper boundaries; parser extraction from `src/gabion/analysis/dataflow_indexed_file_scan.py` into `src/gabion/analysis/indexed_scan/parser_builder.py` is ownership relocation only and preserves existing CLI option names, default values, and taint/ASPF identifier anchors; key-alias normalization extraction into `src/gabion/analysis/indexed_scan/key_aliases.py` preserves cache-identity alias semantics and deterministic key normalization behavior without changing taint/ASPF crosswalk identifiers or in-step obligations; resolved-edge parameter-event extraction into `src/gabion/analysis/indexed_scan/edge_param_events.py` preserves call-argument to callee-parameter event semantics and associated evidence anchors without changing taint/ASPF crosswalk identifiers or in-step obligations; unused-argument flow analysis extraction into `src/gabion/analysis/indexed_scan/unused_arg_flow.py` preserves caller/callee unused-parameter smell emission semantics and evidence-anchor identifiers without changing taint/ASPF crosswalk identifiers or in-step obligations; callee-resolution helper extraction into `src/gabion/analysis/indexed_scan/callee_resolution_helpers.py` preserves decorator-name and local-method hierarchy resolution semantics while relocating ownership away from the indexed monolith without changing taint/ASPF crosswalk identifiers or in-step obligations; import-DAG cycle reduction, timeout-context ordering isolation, and cli-support submodule moves in this correction unit are path/ownership restructuring only and do not change ASPF taint-crosswalk IDs, anchors, or mapped in-step obligations; identity shadow runtime carrier simplification (legacy fast integer carrier removal), progress token alias cutover to v2 defaults, and stage-2 hard cut removal of `progress-v1` transport from `src/gabion` preserve existing ASPF taint crosswalk identifiers, anchor keys, and in-step obligations; canonical progress schema hard-cut to `gabion/canonical_progress_event_v2`, transition-v2-only parsing/emission, identity shadow